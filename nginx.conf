# =========================================================================================
# SURYA CREDIT NETWORKS: HIGH-AVAILABILITY ENTERPRISE REVERSE PROXY & GATEWAY CONFIGURATION
# Optimized for high-throughput, SSL termination, and proactive security hardening
# =========================================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format optimized for audit tracking and security metrics
    log_format main_json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"rate_limit_status":"$limit_req_status"'
    '}';

    access_log /var/log/nginx/access_json.log main_json;

    # Performance Optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Suppress version info for security scan compliance

    # Gzip Compression Tuning
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting Configuration (Protects against DDoS and brute force)
    # Allows 20 requests per second per IP with burst storage
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=20r/s;

    # Connection pooling for high-throughput NestJS upstream
    upstream surya_backend_cluster {
        server api:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # Standard HTTPS Server Configuration (Port 443)
    server {
        listen 80;
        listen [::]:80;
        server_name api.suryacredit.com localhost;

        # Redirect all HTTP requests to HTTPS (Strict Transport Security enforcement)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.suryacredit.com localhost;

        # Self-signed/Let's Encrypt certificates loaded in production environment
        ssl_certificate /etc/nginx/ssl/surya_server.crt;
        ssl_certificate_key /etc/nginx/ssl/surya_server.key;

        # Advanced SSL/TLS Tuning
        ssl_protocols TLSv1.2 TLSv1.3; # Enforce modern cryptology (disable old SSL/TLS versions)
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        # Session resumption cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers Configuration (OWASP Standard compliance)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always; # Prevents clickjacking
        add_header X-Content-Type-Options "nosniff" always; # Prevents MIME type sniffing
        add_header X-XSS-Protection "1; mode=block" always; # Enforces XSS protection
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Client request limits (Protects against memory exhaust attacks)
        client_max_body_size 10M; # Cap files at 10MB (suitable for KYC/Invoices uploads)
        client_body_buffer_size 128k;

        # Proactive Protection: Detect common Web attacks (SQL Injection, directory traversal)
        # Block SQL Injection characters
        if ($query_string ~* "union.*select.*\(") {
            return 403;
        }
        if ($query_string ~* "concat.*\(") {
            return 403;
        }
        # Block directory traversal sequences
        if ($request_uri ~* "\.\./") {
            return 403;
        }

        # Reverse Proxy Routing to NestJS Core API Gateway
        location / {
            # Enforce dynamic request rate limiting (Burst capacity 30, no delaying matching requests)
            limit_req zone=api_limit_zone burst=30 nodelay;

            proxy_pass http://surya_backend_cluster;
            proxy_http_version 1.1;

            # Keep Connection Open with pooled upstream server
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Dynamic Timeout Management (Prevents gateway pool starvation)
            proxy_connect_timeout 5s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
        }

        # Cache control optimization for reports and static resources
        location /static/ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Fallback error mapping for internal errors
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
