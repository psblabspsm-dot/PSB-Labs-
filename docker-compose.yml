version: '3.8'

services:
  # 1. NestJS Core API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://surya_admin:SuryaPassWord2026@postgres:5432/surya_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=SURYA_CREDIT_SECURE_KEY_2026_CHANGE_THIS_IN_PROD_128BIT
    depends_on:
      - postgres
      - redis
    networks:
      - surya-network
    restart: always

  # 2. Relational PostgreSQL Core Database
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=surya_admin
      - POSTGRES_PASSWORD=SuryaPassWord2026
      - POSTGRES_DB=surya_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - surya-network

  # 3. Redis High-Availability In-Memory Session & Cache
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - surya-network

  # 4. Enterprise NGINX Reverse Proxy (Gateway Router)
  proxy:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - surya-network

networks:
  surya-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
