apiVersion: v1
kind: Namespace
metadata:
  name: surya-prod

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: surya-config
  namespace: surya-prod
data:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_URL: "postgresql://surya_admin:SuryaPassWord2026@postgres-service:5432/surya_db?schema=public&sslmode=prefer"
  REDIS_URL: "redis://redis-service:6379"
  SMS_GATEWAY_PROVIDER: "msg91"
  SMS_GATEWAY_SENDER_ID: "SURYAC"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_SENDER: "no-reply@suryacredit.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: surya-secrets
  namespace: surya-prod
type: Opaque
data:
  # Base64 encoded values for production secrets
  JWT_SECRET: "U1VSWUFfQ1JFRElUX1NFQ1VSRV9LRVlfMjAyNl9DSEFOR0VfVEhJU19JTl9QUk9EXzEyOEJJVA==" # SURYA_CREDIT_SECURE_KEY_2026_CHANGE_THIS_IN_PROD_128BIT
  POSTGRES_PASSWORD: "U3VyeWFQYXNzV29yZDIwMjY=" # SuryaPassWord2026
  RAZORPAY_KEY_SECRET: "eW91cl9yYXpvcnBheV9zZWNyZXRfa2V5" # your_razorpay_secret_key
  CASHFREE_SECRET_KEY: "Y2FzaGZyZWVfcHJvZF93b3JraW5nX3NlY3JldF9rZXk=" # cashfree_prod_working_secret_key
  GOOGLE_CLIENT_SECRET: "eW91cl9nb29nbGVfb2F1dGgyLWNsaWVudC1zZWNyZXQta2V5" # your-google-oauth2-client-secret-key

---
# Relational Postgres Persistent Volume Claim for Enterprise Ledger
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: surya-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# Relational Postgres Database StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: surya-prod
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "surya_admin"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: surya-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "surya_db"
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 1Gi
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 50Gi

---
# Postgres Network Service Layer
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: surya-prod
spec:
  ports:
    - port: 5432
  selector:
    app: postgres

---
# High-Availability Redis State Store (No-SQL / Cache)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: surya-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: "500m"
              memory: 1Gi
            requests:
              cpu: "250m"
              memory: 512Mi

---
# Redis Network Service Layer
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: surya-prod
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---
# Surya Core API Pod Deployment (NestJS Server)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surya-api
  namespace: surya-prod
  labels:
    app: surya-api
spec:
  replicas: 3 # Standard Multi-AZ Active Availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: surya-api
  template:
    metadata:
      labels:
        app: surya-api
    spec:
      containers:
        - name: surya-api
          image: gcr.io/surya-fintech-prod/surya-core-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: surya-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: surya-secrets
                  key: JWT_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: surya-secrets
                  key: POSTGRES_PASSWORD
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: surya-secrets
                  key: RAZORPAY_KEY_SECRET
            - name: CASHFREE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: surya-secrets
                  key: CASHFREE_SECRET_KEY
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: surya-secrets
                  key: GOOGLE_CLIENT_SECRET
          livenessProbe:
            httpGet:
              path: /api/v1/payments/audit-logs
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/payments/audit-logs
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            limits:
              cpu: "1.5"
              memory: 1.5Gi
            requests:
              cpu: "500m"
              memory: 768Mi

---
# Surya Core API Service Layer
apiVersion: v1
kind: Service
metadata:
  name: surya-api-service
  namespace: surya-prod
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: surya-api

---
# Horizontal Pod Autoscaler (HPA) for Scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: surya-api-hpa
  namespace: surya-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: surya-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

---
# Ingress Controller with TLS Termination via Let's Encrypt
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surya-ingress
  namespace: surya-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.suryacredit.com
      secretName: surya-tls-certs
  rules:
    - host: api.suryacredit.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: surya-api-service
                port:
                  number: 80
